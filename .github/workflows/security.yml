# ============================================================================
# IPSSI_APOCAL_KIT — CI Sécurité (Perturbation J3 : Prompt Injection)
# ----------------------------------------------------------------------------
# Exécute le JEU DE TESTS ADVERSARIAUX (T1..T5) à chaque push / PR sur main.
# Ces tests sont déterministes (aucun appel LLM réel) : ils vérifient que les
# 4 couches de défense de llm/services/quiz_prompt.py neutralisent les 5
# familles d'attaque. Un échec BLOQUE la PR (critère CA-J3-6/7).
# ============================================================================

name: Security (adversarial LLM)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  adversarial:
    name: Tests adversariaux (OWASP LLM-01)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    env:
      DJANGO_DEBUG: 'False'
      DJANGO_SECRET_KEY: 'ci-only-not-secret'
      DJANGO_ALLOWED_HOSTS: '*'
      LLM_BACKEND: mock  # aucun appel LLM réseau : tests purement défensifs

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run adversarial security tests (T1..T5)
        run: pytest llm/test_adversarial.py -v -p no:cacheprovider
